name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetching all history to ensure proper version detection

      - name: Set up Python 3.12.6
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.6'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from tag
        id: get_version
        run: |
          $VERSION = "${{ github.ref_name }}"
          $VERSION = $VERSION -replace "^v", ""
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Clean previous builds
        run: python build.py clean

      - name: Build custom bootloader
        run: python build.py bootloader

      - name: Build and package application
        run: |
          python build.py all --version ${{ steps.get_version.outputs.version }} --app-uac asInvoker --installer-uac requireAdministrator

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/VLC Discord Presence.exe
            dist/VLC Discord RP Setup.exe
            VLC_Discord_RP.zip

      - name: Read Changelog
        id: changelog
        run: |
          $CHANGELOG = Get-Content -Path CHANGELOG.md -Raw
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $PATTERN = "## \[$VERSION\].*?(## \[|$)"
          $MATCH = [regex]::Match($CHANGELOG, $PATTERN, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($MATCH.Success) {
            $RELEVANT = $MATCH.Value
            # Remove the next version header if it was captured in the pattern
            $RELEVANT = $RELEVANT -replace "## \[\d+\.\d+\.\d+\].*$", ""
            # Use GitHub's multiline output syntax
            echo "text<<EOF" >> $env:GITHUB_OUTPUT
            echo "$($RELEVANT.Trim())" >> $env:GITHUB_OUTPUT
            echo "EOF" >> $env:GITHUB_OUTPUT
          } else {
            echo "text=No changelog entry found for version $VERSION" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: VLC Discord Rich Presence ${{ steps.get_version.outputs.version }} (Pre-release)
          body: |
            ${{ steps.changelog.outputs.text }}

            ## Installation
            Download and run the installer (`VLC Discord RP Setup.exe`), or use the standalone application.

            **Note**: This is a pre-release version and may contain bugs.
          files: |
            dist/VLC Discord RP Setup.exe
            VLC_Discord_RP.zip
          draft: false
          prerelease: true  # Changed to true for pre-release
